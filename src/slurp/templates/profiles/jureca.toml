# JURECA profile template (abbreviated; this copy is stale -- Stages/2024, jrlogin).
# For the maintained, verified template see templates/jureca.toml at the repo root.
# Usage: slurp config add-profile jureca --hostname jureca.fz-juelich.de --user $USER --partition dc-gpu --account <account>

[profiles.jureca]
hostname = "jrlogin"
username = ""
partition = "dc-gpu"
account = ""

prologue = """
jutil env activate -p {account}
module load Stages/2024
module load CUDA/12
module load PyTorch
source $PROJECT/.venv/bin/activate
export NCCL_IB_HCA=mlx5_0,mlx5_1
"""

mpi_mode = "pmi2"
cpu_bind = "cores"
gpu_flag_style = "gres"

[profiles.jureca.sync]
local = "."
remote = "$PROJECT/slurp-projects"  # slurp resolves $PROJECT; NOT $HOME. See templates/jureca.toml
