repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check src/slurp/ tests/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format src/slurp/ tests/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: mypy
        name: mypy
        entry: uv run mypy src/slurp/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest
        entry: uv run pytest tests/unit/ -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
